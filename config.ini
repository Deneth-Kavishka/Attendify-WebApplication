# SmartTrack RFID System Configuration
# Edit these settings to match your environment

[Database]
host = localhost
database = attendify
user = postgres
password = your_password_here

[Serial]
port = COM7
baud_rate = 115200

[Arduino]
device_id = RFID_SCANNER_001
location = Main Entrance
version = SERIAL_v1.0

[Firebase]
service_account_path = firebase-service-account.json
project_id = your-firebase-project-id

[System]
debug_mode = true
log_level = INFO
